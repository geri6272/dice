
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Dice Roller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --primary: #00d4aa;
            --secondary: #00a3cc;
            --accent: #ff6b9d;
            --text: #f5f5f5;
            --text-dim: #888888;
            --border: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Layout */
        #sidebar {
            width: 248px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        #center {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
        }

        #rune-panel {
            width: 280px;
            background-color: var(--surface);
            border-left: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: opacity 200ms ease;
            opacity: 0; /* Hidden initially */
            pointer-events: none;
            z-index: 10;
        }

        /* Components */
        h2 {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 400;
            margin-bottom: 12px;
        }

        #dice-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        button.dice-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button.dice-btn:hover {
            border-color: var(--primary);
        }

        button.dice-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        #roll-btn {
            width: 100%;
            height: 48px;
            background-color: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }

        #roll-btn:hover {
            opacity: 0.9;
        }

        #history-container {
            flex-grow: 1;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        #history-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Rune Display */
        #rune-symbol {
            font-size: 64px;
            color: var(--text);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 212, 170, 0.3);
        }

        #rune-name {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 16px;
            font-weight: bold;
        }

        #rune-meaning {
            font-size: 14px;
            color: #c0c0c0;
            line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
    
    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <h2>DICE TYPE</h2>
        <div id="dice-selector">
            <button class="dice-btn" data-type="d4">d4</button>
            <button class="dice-btn" data-type="d6">d6</button>
            <button class="dice-btn" data-type="d8">d8</button>
            <button class="dice-btn" data-type="d10">d10</button>
            <button class="dice-btn" data-type="d12">d12</button>
            <button class="dice-btn" data-type="d20">d20</button>
        </div>

        <button id="roll-btn">ROLL FATE</button>

        <h2>HISTORY</h2>
        <div id="history-container">
            <div id="history-list"></div>
        </div>
    </div>

    <!-- Center -->
    <div id="center">
        <div id="canvas-container"></div>
    </div>

    <!-- Rune Panel -->
    <div id="rune-panel">
        <div id="rune-symbol"></div>
        <div id="rune-name"></div>
        <div id="rune-meaning"></div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { RuneMap } from './src/runes.js?v=2';
        import { UI } from './src/ui.js?v=2';
        import { DiceRoller } from './src/dice.js?v=2';

        // Initialize
        const container = document.getElementById('canvas-container');
        
        const roller = new DiceRoller(container, (result) => {
            console.log("Rolled:", result);
            ui.setRolling(false);
            
            // Find Rune
            const type = ui.selectedDiceType;
            const runes = RuneMap[type];
            const rune = runes.find(r => r.value === result);
            
            if (rune) {
                ui.showRuneResult(result, rune);
            } else {
                console.error("Rune not found for result", result, type);
            }
        });

        const ui = new UI({
            onRoll: (type) => {
                ui.setRolling(true);
                roller.roll();
            },
            onSelectDice: (type) => {
                roller.createDice(type);
            }
        });

        // Initial creation
        roller.createDice('d20');

    </script>
</body>
</html>
